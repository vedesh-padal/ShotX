{% extends "base.html" %}

{% block extrahead %}
  {% if page.is_homepage %}
    <!-- Manual Social Meta for Homepage (Optimized 77KB JPG) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="ShotX — Screen Capture & Screenshot Tool for Linux">
    <meta property="og:description" content="A free, open-source screenshot and screen capture tool for Linux — inspired by ShareX.">

    <meta name="twitter:title" content="ShotX — Screen Capture & Screenshot Tool for Linux">
    <meta name="twitter:description" content="A free, open-source screenshot and screen capture tool for Linux — inspired by ShareX.">
