name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up latest uv
        uses: astral-sh/setup-uv@v5

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Install system dependencies
        run: just setup-deps-debian

      - name: Install dependencies
        run: just sync

      - name: Lint with ruff
        run: just lint

      - name: Type check with mypy
        run: just typecheck

      - name: Run tests with pytest
        env:
          QT_QPA_PLATFORM: xcb
          QT_DEBUG_PLUGINS: 1
        run: just test
